<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Apno Digital Studio</title>
</head>

<body>

    <nav class="nav">
        <div class="nav__logo">Apno Studio</div>
        <ul class="nav__list">
            <li><a href="/" class="nav__link">Home</a></li>
            <li><a href="/work/" class="nav__link">Work</a></li>
            <li><a href="/contact/" class="nav__link">Contact</a></li>
        </ul>
    </nav>

    <main data-scroll-container>

        <section class="page-header" data-scroll-section>
            <div class="container">
                <h1 data-scroll data-scroll-speed="1">Get in Touch</h1>
            </div>
        </section>

        <section class="contact-section section-padding" data-scroll-section>
            <div class="container contact-grid">

                <div class="contact-info">
                    <h3>Studio</h3>
                    <p>Sikar, Rajasthan<br>India</p>

                    <h3>Email</h3>
                    <p><a href="mailto:aapnodigitalstudio@gmail.com">aapnodigitalstudio@gmail.com</a></p>

                    <h3>Socials</h3>
                    <p>
                        <a href="#">Instagram</a><br>
                        <a href="#">YouTube</a>
                    </p>
                </div>

                <form class="contact-form">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Your Email">
                    </div>
                    <div class="form-group">
                        <label>Project Details</label>
                        <textarea placeholder="Tell us about your project"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>

            </div>
        </section>

        <footer class="footer" data-scroll-section>
            <div class="container">
                <h2>Let's Create</h2>
                <a href="mailto:aapnodigitalstudio@gmail.com" class="footer__cta">aapnodigitalstudio@gmail.com</a>
            </div>
        </footer>

    </main>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
